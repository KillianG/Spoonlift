name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          for candidate in /Applications/Xcode_16*.app /Applications/Xcode_15*.app /Applications/Xcode.app; do
            if [ -d "$candidate" ]; then sudo xcode-select -s "$candidate"; break; fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            REF="${GITHUB_REF_NAME}"
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"

          echo -n "$CERT_B64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PW" -A \
              -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
              -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
              $(security list-keychains -d user | sed -e 's/"//g')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep "Developer ID Application" | head -1 \
              | sed -E 's/.*"([^"]+)".*/\1/')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using identity: $IDENTITY"

      - name: Build, sign, notarize, package DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spoonlift-${{ steps.version.outputs.version }}.dmg
          path: build/Spoonlift-${{ steps.version.outputs.version }}.dmg

      - name: Publish release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Spoonlift-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Spoonlift ${{ steps.version.outputs.version }}

            Native macOS file manager inspired by Forklift. Open source, MIT licensed.

            ### Install
            1. Download `Spoonlift-${{ steps.version.outputs.version }}.dmg` below.
            2. Open the DMG and drag **Spoonlift** to `Applications`.
            3. On first launch, macOS will say *"Spoonlift can't be opened because it is from an unidentified developer"*. That's expected — Spoonlift isn't signed with an Apple Developer ID. Get around it either way:
               - **Right-click** Spoonlift in Applications → **Open** → click **Open** in the confirmation dialog. You only need to do this once.
               - Or from Terminal: `xattr -cr /Applications/Spoonlift.app`

            Requires macOS 14 Sonoma or newer.
